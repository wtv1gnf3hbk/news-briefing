# Generate briefing daily at 6am ET
# Also runs on manual trigger for testing

name: Generate Briefing

on:
  schedule:
    # 6am ET = 11:00 UTC (during EST)
    # Note: During EDT (daylight saving), this will be 7am ET
    - cron: '0 11 * * *'

  # Manual trigger for testing
  workflow_dispatch:

# Cancel in-progress runs when a new one starts (avoids wasting Actions minutes)
concurrency:
  group: briefing-generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache Puppeteer's Chromium download (~200MB)
      # Without this, npm install takes 5+ min and sometimes hangs
      - name: Cache Puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Scrape headlines
        env:
          ECONOMIST_EMAIL: ${{ secrets.ECONOMIST_EMAIL }}
          ECONOMIST_PASSWORD: ${{ secrets.ECONOMIST_PASSWORD }}
        run: node generate-briefing.js

      - name: Write V1 briefing (single-pass)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node write-briefing.js

      - name: Write V2 briefing (3-pass editorial chain)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node write-briefing-v2.js

      # Auto-fix: mechanically correct 's contractions, "amid", tacked-on analysis
      # before validation. Synced from nyt-concierge/fix-draft.js.
      - name: Auto-fix V1 briefing
        continue-on-error: true
        run: |
          if [ -f briefing.md ]; then
            node fix-draft.js briefing.md > briefing-fixed.md && mv briefing-fixed.md briefing.md
          fi

      - name: Auto-fix V2 briefing
        continue-on-error: true
        run: |
          if [ -f briefing-v2/briefing.md ]; then
            node fix-draft.js briefing-v2/briefing.md > briefing-v2/briefing-fixed.md && mv briefing-v2/briefing-fixed.md briefing-v2/briefing.md
          fi

      # Post-draft quality gate: 13 automated checks.
      # Exit 1 = BLOCKING errors (link diversity, Google News URLs, attribution
      #   mismatches) — build fails, briefing not published.
      # Exit 2 = warnings only (banned phrases, contractions, etc.) — logged
      #   but build continues.
      - name: Validate V1 briefing
        run: |
          set +e
          node validate-draft.js briefing.md
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then
            echo "::error::Blocking validation errors in V1 — build halted"
            exit 1
          fi

      - name: Validate V2 briefing
        continue-on-error: true
        run: |
          if [ -f briefing-v2/briefing.md ]; then
            set +e
            node validate-draft.js briefing-v2/briefing.md
            EXIT_CODE=$?
            set -e
            if [ $EXIT_CODE -eq 1 ]; then
              echo "::error::Blocking validation errors in V2"
              exit 1
            fi
          else
            echo "No V2 briefing to validate"
          fi

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Fetch latest remote state before committing
          # This prevents "fetch first" rejections when concurrent runs push
          git fetch origin main
          git reset --soft origin/main

          # Now stage and commit on top of the latest remote
          git add briefing.json briefing.md index.html briefing-v2/index.html briefing-v2/briefing.md
          git diff --staged --quiet || {
            git commit -m "Update briefing $(date -u +%Y-%m-%d)"
            git push origin main
          }
